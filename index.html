<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Định dạng màu sắc và bố cục chung. */
        :root {
            --primary-color: #2563eb;
            --text-main: #0f172a;
            --bg-color: #f8fafc;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }

        /* Thiết kế logo và phần tiêu đề. */
        .header { text-align: center; margin-bottom: 30px; }
        .logo-container { display: flex; align-items: center; gap: 15px; }

        /* Bố cục hai ô nhập liệu song song. */
        .translator-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            background: #fff;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .box {
            flex: 1;
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
        }

        /* Định dạng khung nhập chữ và kết quả. */
        textarea, .result-box {
            width: 100%;
            height: 200px;
            border: none;
            resize: none;
            font-size: 1.15rem;
            background: transparent;
        }
        
        textarea:focus { outline: none; }
        .result-box.error { color: var(--error-color); }

        /* Giao diện nút bấm và hiệu ứng. */
        .btn-translate {
            margin-top: 30px;
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="14" fill="#3B82F6"/>
                <path d="M14 16H24M19 12V16M14 26C14 26 18.5 25.5 21.5 21M26 16C26 16 23.5 24.5 16 30M34 32L28 16L22 32M24 28H32" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <h1>AI Translator Pro</h1>
        </div>
    </div>

    <div class="translator-container">
        <div class="box">
            <strong><i class="fa-solid fa-earth-americas"></i> Tiếng Anh</strong><br><br>
            <textarea id="englishText" placeholder="Nhập văn bản..."></textarea>
        </div>
        <div class="box">
            <strong><i class="fa-solid fa-language"></i> Tiếng Việt</strong><br><br>
            <div id="result" class="result-box">Bản dịch...</div>
        </div>
    </div>

    <button id="translateBtn" class="btn-translate" onclick="dichNgonNgu()">Dịch ngay</button>

    <script>
        // Chuẩn bị nút bấm và ô kết quả.
        async function dichNgonNgu() {
            const textToTranslate = document.getElementById('englishText').value;
            const resultBox = document.getElementById('result');
            
            resultBox.innerText = "Đang xử lý...";
            resultBox.className = 'result-box'; 

            try {
                // Gửi văn bản lên máy chủ để dịch.
                const response = await fetch("http://127.0.0.1:8000/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: textToTranslate })
                });
                
                // Hiển thị bản dịch hoặc thông báo lỗi.
                const data = await response.json();
                if (response.ok) {
                    resultBox.innerText = data.vietnamese;
                } else {
                    resultBox.innerText = "Lỗi: " + data.detail;
                    resultBox.className = 'result-box error';
                }
            } catch (error) {
                resultBox.innerText = "Lỗi kết nối máy chủ!";
                resultBox.className = 'result-box error';
            }
        }
    </script>

</body>
</html>
